<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retire Anywhere Map V5.5 - Professional Explorer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-cyan: #00bcd4;
            --dark-bg: #0f172a;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --text-color: #f8fafc;
            --accent-green: #10b981;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --error-red: #ef4444;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: var(--text-color); overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #0b1120; }

        /* UI Panels */
        .ui-panel {
            position: absolute; top: 20px; right: 20px; width: 340px; background: var(--panel-bg);
            padding: 24px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(16px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
            max-height: 85vh; overflow-y: auto;
        }

        .lang-switcher { position: absolute; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 1001; }
        .lang-btn { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; backdrop-filter: blur(12px); transition: 0.3s; }
        .lang-btn.active { background: var(--primary-cyan); border-color: var(--primary-cyan); font-weight: bold; }

        h1 { font-size: 1.5rem; margin: 0 0 20px 0; font-weight: 900; background: linear-gradient(to right, #60a5fa, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; opacity: 0.7; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .btn-group { display: flex; gap: 6px; margin-bottom: 10px; }
        .choice-btn { flex: 1; padding: 10px 4px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; cursor: pointer; font-size: 0.7rem; transition: 0.3s; }
        
        .choice-btn.active[data-type="lifestyle"][data-val="Essential"] { border-color: var(--accent-purple); background: rgba(168, 85, 247, 0.2); }
        .choice-btn.active[data-type="lifestyle"][data-val="Comfortable"] { border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.2); }
        .choice-btn.active[data-type="lifestyle"][data-val="Luxury"] { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.2); }
        .choice-btn.active[data-type="household"] { border-color: var(--primary-cyan); background: rgba(0, 188, 212, 0.2); }

        input[type=range] { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 5px; outline: none; -webkit-appearance: none; accent-color: var(--primary-cyan); }

        .share-btn {
            width: 100%; margin-top: 15px; padding: 14px; border-radius: 14px; background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); transition: 0.3s;
        }

        /* Tooltip Styles */
        .leaflet-tooltip-custom {
            background: var(--panel-bg) !important; color: white !important; border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 12px !important; padding: 10px !important; box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(8px) !important; font-size: 0.9rem !important;
        }
        .tooltip-img { width: 140px; height: 80px; border-radius: 8px; object-fit: cover; display: block; margin-top: 8px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal-content { background: #1e293b; border-radius: 32px; width: 500px; max-width: 90%; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .city-image { width: 100%; height: 280px; object-fit: cover; }
        .modal-details { padding: 32px; }
        .city-title { font-size: 2.2rem; font-weight: 900; margin: 0; }
        .landmark-tag { background: var(--primary-cyan); color: #000; padding: 5px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 900; margin-top: 10px; display: inline-block; }
        
        .stat-box { display: flex; justify-content: space-between; padding: 18px; background: rgba(255,255,255,0.03); border-radius: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-item { text-align: center; flex: 1; }
        .stat-label { font-size: 0.7rem; opacity: 0.5; display: block; margin-bottom: 6px; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--primary-cyan); }

        .reached-badge { display: block; margin-top: 20px; padding: 12px; border-radius: 14px; font-weight: 900; font-size: 0.9rem; text-align: center; }
        .badge-yes { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .badge-no { background: rgba(239, 68, 68, 0.2); color: var(--error-red); border: 1px solid var(--error-red); }

        .close-modal { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; z-index: 10; font-size: 24px; }

        /* Postcard Styles */
        #postcard-canvas { display: none; }
        .postcard-controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .postcard-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; color: white; width: 100%; box-sizing: border-box; }

        .methodology-link { display: block; text-align: center; margin-top: 15px; font-size: 0.75rem; color: var(--primary-cyan); cursor: pointer; text-decoration: underline; }

        .legend { position: absolute; bottom: 30px; left: 20px; background: var(--panel-bg); padding: 14px 24px; border-radius: 16px; font-size: 0.8rem; z-index: 1000; display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .footer-info { position: absolute; bottom: 20px; right: 20px; z-index: 1000; background: var(--panel-bg); padding: 10px 20px; border-radius: 12px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="lang-switcher">
        <button id="btn-en" class="lang-btn active" onclick="setLang('en')">English</button>
        <button id="btn-zh" class="lang-btn" onclick="setLang('zh')">繁體中文</button>
    </div>

    <div id="map"></div>

    <div class="ui-panel">
        <h1 id="ui-title">Retire Anywhere V5.5</h1>
        
        <div class="input-group">
            <label id="ui-mode-label">Lifestyle</label>
            <div class="btn-group">
                <button class="choice-btn lifestyle-btn active" data-type="lifestyle" data-val="Essential" onclick="setChoice('lifestyle', 'Essential')">🟣 <span id="txt-ess">Essential</span></button>
                <button class="choice-btn lifestyle-btn" data-type="lifestyle" data-val="Comfortable" onclick="setChoice('lifestyle', 'Comfortable')">🔵 <span id="txt-com">Comfortable</span></button>
                <button class="choice-btn lifestyle-btn" data-type="lifestyle" data-val="Luxury" onclick="setChoice('lifestyle', 'Luxury')">🟢 <span id="txt-lux">Luxury</span></button>
            </div>
        </div>

        <div class="input-group">
            <label id="ui-household-label">Household</label>
            <div class="btn-group">
                <button class="choice-btn household-btn" data-type="household" data-val="single" onclick="setChoice('household', 'single')">👤 <span id="txt-single">Single</span></button>
                <button class="choice-btn household-btn active" data-type="household" data-val="couple" onclick="setChoice('household', 'couple')">👥 <span id="txt-couple">Couple</span></button>
                <button class="choice-btn household-btn" data-type="household" data-val="family" onclick="setChoice('household', 'family')">👨‍👩‍👧‍👦 <span id="txt-family">Family</span></button>
            </div>
        </div>

        <div class="input-group">
            <label><span id="ui-budget-label">Assets (USD)</span>: <span id="budget-display" style="font-weight:bold; color:var(--primary-cyan)">$3,000,000</span></label>
            <input type="range" id="budget-slider" min="100000" max="10000000" step="50000" value="3000000">
        </div>

        <div class="postcard-controls">
            <input type="text" id="postcard-msg" class="postcard-input" placeholder="Custom message for postcard..." value="My future starts here!">
            <button class="share-btn" onclick="generatePostcard()">📸 <span id="ui-share-btn">Create Postcard</span></button>
        </div>

        <div class="methodology-link" id="ui-meth-link" onclick="showMethodology()">How are these numbers calculated?</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--accent-purple)"></div> <span id="leg-ess">Essential</span></div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-blue)"></div> <span id="leg-com">Comfortable</span></div>
        <div class="legend-item"><div class="dot" style="background:var(--accent-green)"></div> <span id="leg-lux">Luxury</span></div>
        <div class="legend-item"><div class="dot" style="background:var(--error-red)"></div> <span id="leg-fail">Needed</span></div>
    </div>

    <div class="footer-info">
        <span id="ui-visitor">Visitors</span>: <span id="visitor-val" style="color:var(--primary-cyan)">3,142</span>
    </div>

    <!-- City Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="close-modal" onclick="closeModal()">&times;</div>
            <img src="" id="city-img" class="city-image" onerror="this.src='https://images.unsplash.com/photo-1464822759023-fed622ff2c3b'">
            <div class="modal-details">
                <div id="modal-country" class="country-title"></div>
                <div id="modal-city" class="city-title"></div>
                <div id="landmark-tag" class="landmark-tag"></div>
                <div class="stat-box">
                    <div class="stat-item"><span class="stat-label" id="lbl-modal-cost">Monthly Cost</span><span id="stat-cost" class="stat-value"></span></div>
                    <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1);"><span class="stat-label" id="lbl-modal-goal">Goal Assets</span><span id="stat-goal" class="stat-value"></span></div>
                </div>
                <div id="reached-badge" class="reached-badge"></div>
            </div>
        </div>
    </div>

    <!-- Methodology Modal -->
    <div id="meth-modal" class="modal">
        <div class="modal-content" style="padding: 32px; max-height: 80vh; overflow-y: auto;">
            <div class="close-modal" onclick="closeModal()">&times;</div>
            <h2 id="meth-title" style="color:var(--primary-cyan)">Methodology</h2>
            <div id="meth-body" style="font-size: 0.95rem; line-height: 1.6; opacity: 0.9;"></div>
        </div>
    </div>

    <!-- Postcard Modal -->
    <div id="postcard-modal" class="modal">
        <div class="modal-content" style="background: #fdf6e3; padding: 20px; color: #5c4b37; width: 840px;">
            <div class="close-modal" onclick="closePostcard()" style="background: rgba(0,0,0,0.1); color: #5c4b37;">&times;</div>
            <div class="postcard-preview-container">
                <img id="postcard-img" src="" style="width: 800px; height: 500px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                <p style="margin-top: 15px; font-size: 0.9rem; font-style: italic;">Right-click to save your retirement dream postcard.</p>
            </div>
        </div>
    </div>
    <canvas id="postcard-canvas" width="800" height="500"></canvas>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let currentLang = 'en';
        let currentMode = 'Essential';
        let currentHousehold = 'couple';
        let fullData = {};
        const markers = [];

        const i18n = {
            en: {
                title: "Retire Anywhere V5.5", modeLabel: "Lifestyle", householdLabel: "Household", budgetLabel: "Assets (USD)",
                ess: "Essential", com: "Comfortable", lux: "Luxury", single: "Single", couple: "Couple", family: "Family",
                reached: "TARGET REACHED", notReached: "ASSETS NEEDED", costLabel: "Monthly Cost", goalLabel: "Goal Assets",
                fail: "Needed", visitor: "Visitors", shareBtn: "Create Postcard",
                methTitle: "How are these calculated?",
                methContent: `
                    <p><b>1. Monthly Living Cost:</b> Derived from 2025-2026 cost-of-living indices (Numbeo, MIT Living Wage). Includes rent, food, transport, and utilities.</p>
                    <p><b>2. Target Asset:</b> Calculated using the <b>4% Safe Withdrawal Rate (SWR)</b>. Formula: (Annual Cost) ÷ 0.04.</p>
                    <p><b>3. Lifestyles:</b><br>
                    • <b>Essential:</b> Covers basic necessities and standard housing.<br>
                    • <b>Comfortable:</b> Essential + 50% buffer for travel and leisure.<br>
                    • <b>Luxury:</b> Essential × 2 for premium lifestyle and high-end housing.</p>
                `
            },
            zh: {
                title: "全球退休夢想圖 V5.5", modeLabel: "退休生活目標", householdLabel: "家庭人數", budgetLabel: "您的資產 (USD)",
                ess: "基本生活", com: "舒適生活", lux: "奢華生活", single: "單人", couple: "雙人", family: "一家四口",
                reached: "已達成目標", notReached: "尚需資產", costLabel: "預估月支出", goalLabel: "目標總資產",
                fail: "尚未達標", visitor: "訪客人數", shareBtn: "生成旅遊明信片",
                methTitle: "數據與計算基準說明",
                methContent: `
                    <p><b>1. 每月生活費：</b> 參考 2025-2026 Numbeo 與 MIT Living Wage 最新數據。包含租金、伙食、交通、水電網路等核心支出。</p>
                    <p><b>2. 目標總資產：</b> 採用國際通用的 <b>4% 提領率 (Safe Withdrawal Rate)</b>。公式為：(年支出) ÷ 0.04。</p>
                    <p><b>3. 生活水平定義：</b><br>
                    • <b>基本生活：</b> 涵蓋所有核心需求與平均水準住房。<br>
                    • <b>舒適生活：</b> 基本支出的 1.5 倍（包含旅遊與娛樂緩衝）。<br>
                    • <b>奢華生活：</b> 基本支出的 2 倍（高階住房與頂級生活享受）。</p>
                `
            }
        };

        const map = L.map('map', { center: [30, 10], zoom: 3, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        async function loadData() {
            try {
                let res = await fetch('world_retirement_data.json');
                if (!res.ok) res = await fetch('../world_retirement_data.json');
                fullData = await res.json();
                updateMarkers();
            } catch (e) { console.error(e); }
        }

        function setLang(lang) {
            currentLang = lang;
            const t = i18n[lang];
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
            document.getElementById('ui-title').textContent = t.title;
            document.getElementById('ui-mode-label').textContent = t.modeLabel;
            document.getElementById('ui-household-label').textContent = t.householdLabel;
            document.getElementById('ui-budget-label').textContent = t.budgetLabel;
            document.getElementById('ui-share-btn').textContent = t.shareBtn;
            document.getElementById('ui-visitor').textContent = t.visitor;
            document.getElementById('ui-meth-link').textContent = t.methTitle;
            ['ess','com','lux','single','couple','family'].forEach(id => document.getElementById('txt-'+id).textContent = t[id]);
            ['ess','com','lux','fail'].forEach(id => document.getElementById('leg-'+id).textContent = t[id]);
            updateMarkers();
        }

        function setChoice(type, val) {
            if (type === 'lifestyle') currentMode = val;
            if (type === 'household') currentHousehold = val;
            document.querySelectorAll(`.${type}-btn`).forEach(btn => btn.classList.toggle('active', btn.dataset.val === val));
            updateMarkers();
        }

        function formatCurrency(val) { return '$' + Math.round(val).toLocaleString('en-US'); }

        function updateMarkers() {
            const budget = parseFloat(document.getElementById('budget-slider').value);
            markers.forEach(m => map.removeLayer(m));
            markers.length = 0;
            const modeColors = { 'Essential': '#a855f7', 'Comfortable': '#3b82f6', 'Luxury': '#10b981' };

            Object.entries(fullData).forEach(([country, countryData]) => {
                Object.entries(countryData.Cities || {}).forEach(([cityName, data]) => {
                    const monthlyCost = data[`monthly_living_cost_${currentHousehold}`];
                    const baseThresh = (monthlyCost * 12) / 0.04;
                    const goals = { 'Essential': baseThresh, 'Comfortable': baseThresh * 1.5, 'Luxury': baseThresh * 2.0 };
                    const goal = goals[currentMode];
                    const isReached = budget >= goal;
                    const color = isReached ? modeColors[currentMode] : '#ef4444';

                    const marker = L.circleMarker(data.coords, {
                        radius: isReached ? 16 : 10, fillColor: color, color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
                    }).addTo(map);
                    
                    const name = currentLang === 'zh' ? data.zh : cityName;
                    marker.bindTooltip(`
                        <div style="text-align:center">
                            <b>${name}</b><br>
                            <img src="${data.img}" class="tooltip-img" onerror="this.style.display='none'">
                        </div>
                    `, { className: 'leaflet-tooltip-custom', direction: 'top', offset: [0, -10] });

                    marker.on('click', () => {
                        const t = i18n[currentLang];
                        document.getElementById('city-img').src = data.img;
                        document.getElementById('modal-country').textContent = country;
                        document.getElementById('modal-city').textContent = name;
                        document.getElementById('landmark-tag').textContent = (currentLang === 'zh' ? data.zh_landmark : data.landmark);
                        document.getElementById('stat-cost').textContent = formatCurrency(monthlyCost);
                        document.getElementById('stat-goal').textContent = formatCurrency(goal);
                        const badge = document.getElementById('reached-badge');
                        badge.textContent = isReached ? t.reached : t.notReached;
                        badge.className = `reached-badge ${isReached ? 'badge-yes' : 'badge-no'}`;
                        document.getElementById('detail-modal').style.display = 'flex';
                    });
                    markers.push(marker);
                });
            });
        }

        function generatePostcard() {
            const canvas = document.getElementById('postcard-canvas');
            const ctx = canvas.getContext('2d');
            const customMsg = document.getElementById('postcard-msg').value;
            const budgetStr = document.getElementById('budget-display').textContent;
            
            ctx.fillStyle = "#fdf6e3"; ctx.fillRect(0, 0, 800, 500);
            ctx.strokeStyle = "#5c4b37"; ctx.lineWidth = 2; ctx.strokeRect(20, 20, 760, 460);
            
            // Text
            ctx.fillStyle = "#5c4b37";
            ctx.font = "bold 36px 'Nothing You Could Do', cursive";
            ctx.fillText(customMsg, 50, 80);
            
            ctx.font = "bold 24px 'Inter'";
            ctx.fillText(`Asset Budget: ${budgetStr}`, 50, 140);
            ctx.fillText(`${currentMode} Lifestyle (${currentHousehold})`, 50, 180);
            
            // Stamp
            ctx.setLineDash([5, 5]); ctx.strokeRect(650, 50, 100, 120); ctx.setLineDash([]);
            ctx.font = "14px 'Inter'"; ctx.fillText("AIR MAIL", 665, 115);
            
            // List Reached Cities (Random 5)
            ctx.font = "bold 20px 'Inter'"; ctx.fillText("Top Reached Destinations:", 430, 250);
            let y = 290; let count = 0;
            Object.values(fullData).forEach(cData => {
                Object.values(cData.Cities).forEach(d => {
                    const cost = d[`monthly_living_cost_${currentHousehold}`];
                    const goal = (cost * 12 / 0.04) * (currentMode === 'Essential' ? 1 : (currentMode === 'Comfortable' ? 1.5 : 2));
                    if (parseFloat(document.getElementById('budget-slider').value) >= goal && count < 5) {
                        ctx.font = "18px 'Inter'";
                        ctx.fillText(`• ${currentLang === 'zh' ? d.zh : Object.keys(cData.Cities).find(key => cData.Cities[key] === d)}`, 430, y);
                        y += 30; count++;
                    }
                });
            });

            document.getElementById('postcard-img').src = canvas.toDataURL();
            document.getElementById('postcard-modal').style.display = 'flex';
        }

        function showMethodology() {
            const t = i18n[currentLang];
            document.getElementById('meth-title').textContent = t.methTitle;
            document.getElementById('meth-body').innerHTML = t.methContent;
            document.getElementById('meth-modal').style.display = 'flex';
        }

        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closePostcard() { document.getElementById('postcard-modal').style.display = 'none'; }
        
        document.getElementById('budget-slider').addEventListener('input', (e) => {
            document.getElementById('budget-display').textContent = formatCurrency(e.target.value);
            updateMarkers();
        });

        loadData();
        setLang('en');
    </script>
</body>
</html>
